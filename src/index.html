<!DOCTYPE html>
<html lang="en" class="v-h-full v-dark">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vyaktitva</title>

        <!-- prerequisite assets -->
        <link rel="stylesheet" href="/build/vyaktitva.css">
        <meta name="theme-color" content="#1e293b">

        <!-- vyaktitva -->
        <script type="module" src="/build/vyaktitva.esm.js"></script>
        <script nomodule src="/build/vyaktitva.js"></script>
        <link rel="stylesheet" href="./assets/css/fonts.css">

        <!-- switch theme accordingly -->
        <script>
            // apply the initial app theme
            const setThemeColor = (isLight) => document.querySelector('meta[name=theme-color]').setAttribute('content', isLight ? '#ffffff' : '#1e293b')
            setThemeColor(window.matchMedia('(prefers-color-scheme: light)').matches)

            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)
                document.querySelector('html').classList.remove('v-dark')
            
            // listen for system theme change, and update accordingly
            window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', event => {
                if (event.matches) {
                    document.querySelector('html').classList.remove('v-dark')
                    setThemeColor(true)
                } else {
                    document.querySelector('html').classList.add('v-dark')
                    setThemeColor(false)
                }
            })
        </script>
    </head>

    <body class="v-h-full v-flex v-flex-col v-bg-slate-100 v-text-slate-700 dark:v-bg-slate-900 dark:v-text-white" style="height: 200vh;">
        <!-- the header -->
        <v-header brand="vyaktitva" class="v-z-50"></v-header>

        <!-- the sub header -->
        <v-sub-header brand="vyaktitva" class="v-sticky v-top-0 v-z-40">
            <div class="v-flex v-space-x-2 md:v-space-x-4">
                <a href="#">One</a>
                <a href="#">Two</a>
                <a href="#">Three</a>
                <a href="#">Four</a>
            </div>
        </v-sub-header>

        <!-- the footer -->
        <v-footer brand="vyaktitva" class="v-mt-auto"></v-footer>
    </body>
</html>
