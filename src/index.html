<!DOCTYPE html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>vyaktitva</title>

        <!-- prerequisite assets -->
        <link rel="stylesheet" href="/build/vyaktitva.css">
        <meta name="theme-color" content="#1e293b">

        <!-- load vyaktitva -->
        <script type="module" src="/build/vyaktitva.esm.js"></script>
        <script nomodule src="/build/vyaktitva.js"></script>

        <!-- switch theme accordingly -->
        <script>
            // apply the initial app theme
            const setThemeColor = (isLight) => document.querySelector('meta[name=theme-color]').setAttribute('content', isLight ? '#ffffff' : '#1e293b')
            setThemeColor(window.matchMedia('(prefers-color-scheme: light)').matches)

            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)
                document.querySelector('html').classList.remove('dark')
            
            // listen for system theme change, and update accordingly
            window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', event => {
                if (event.matches) {
                    document.querySelector('html').classList.remove('dark')
                    setThemeColor(true)
                } else {
                    document.querySelector('html').classList.add('dark')
                    setThemeColor(false)
                }
            })
        </script>
    </head>

    <body class="h-screen flex flex-col bg-slate-100 text-slate-700 dark:bg-slate-900 dark:text-white" style="height: 200vh;">
        <!-- the header -->
        <v-header brand="vyaktitva" class="z-50 border-b border-slate-200 bg-white dark:bg-slate-800 dark:border-slate-700"></v-header>

        <!-- the sub header -->
        <v-sub-header brand="vyaktitva" class="sticky top-0 z-40 font-medium border-b border-slate-200 bg-white/[0.85] backdrop-blur-xl dark:text-white dark:border-slate-700 dark:bg-slate-800/90">
            <div class="flex space-x-2 md:space-x-4">
                <a href="#">One</a>
                <a href="#">Two</a>
                <a href="#">Three</a>
                <a href="#">Four</a>
            </div>
        </v-sub-header>

        <!-- the footer -->
        <v-footer brand="vyaktitva" class="mt-auto bg-white border-t border-slate-200 dark:bg-slate-800 dark:border-slate-700"></v-footer>
    </body>
</html>
